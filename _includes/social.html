<div class="container-fluid justify-content-center">

  {%- assign unfocused_color = "6c757d" -%}

  {% for account in site.author %}

  {%- assign service_name = account[0] -%}
  {%- assign service_data = site.data.social-media[service_name] -%}
  {%- if service_data -%}
  <a class="social mx-1" href="{{ service_data.url }}{{ account[1] }}" style="color: #{{ unfocused_color }}"
    onMouseOver="this.style.color='#{{ service_data.color }}'" onMouseOut="this.style.color='#{{ unfocused_color }}'">
    <i class="{{ service_data.icon }} fa-1x"></i>
  </a>
  {%- endif -%}

  {% endfor %}

  <a rel="me" class="social mx-1" href="https://chaos.social/@aheil" style="color: #6c757d"
    onmouseover="this.style.color='#5b4ae0'" onmouseout="this.style.color='#6c757d'">
    <i class="fab fa-mastodon fa-1x"></i>
  </a>

</div>
